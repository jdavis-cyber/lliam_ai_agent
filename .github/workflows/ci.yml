name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # ── Security: block merge on high/critical vulnerabilities ──────────
      - name: npm audit (blocks on high/critical)
        run: npm audit --audit-level=high

      # ── Security: socket.dev supply chain scan ──────────────────────────
      - name: socket.dev scan
        run: |
          npm install -g @socketsecurity/cli
          socket scan create . --strict || {
            echo "::error::socket.dev scan found supply chain risks — review before merging"
            exit 1
          }
